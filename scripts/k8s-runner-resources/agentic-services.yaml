# Standalone services for agentic runner pods.
# These run as shared Deployments + ClusterIP Services so all runner pods
# connect to the same instances instead of running per-pod sidecars.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-db
  namespace: actions-runner-system
  labels:
    app: oracle-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-db
  template:
    metadata:
      labels:
        app: oracle-db
    spec:
      containers:
        - name: oracle-db
          image: gvenzl/oracle-free:23-slim-faststart
          ports:
            - containerPort: 1521
          env:
            - name: ORACLE_PASSWORD
              value: oracle
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            exec:
              command: ["healthcheck.sh"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["healthcheck.sh"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-db
  namespace: actions-runner-system
  labels:
    app: oracle-db
spec:
  selector:
    app: oracle-db
  ports:
    - port: 1521
      targetPort: 1521
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brave-search
  namespace: actions-runner-system
  labels:
    app: brave-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brave-search
  template:
    metadata:
      labels:
        app: brave-search
    spec:
      containers:
        - name: brave-search
          image: shoofio/brave-search-mcp-sse:1.0.10
          ports:
            - containerPort: 8080
          env:
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: brave-api-key
                  key: api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: brave-search
  namespace: actions-runner-system
  labels:
    app: brave-search
spec:
  selector:
    app: brave-search
  ports:
    - port: 8080
      targetPort: 8080
